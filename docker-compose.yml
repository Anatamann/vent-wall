services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ventwall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ventwall}
      POSTGRES_DB: ${POSTGRES_DB:-ventwall}
    ports:
      - "${VENTWALL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ventwall_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ventwall}
      POSTGRES_DB: ${POSTGRES_DB:-ventwall}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ventwall}:${POSTGRES_PASSWORD:-ventwall}@postgres:5432/${POSTGRES_DB:-ventwall}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (see .env.docker.example)}
      IP_HASH_SECRET: ${IP_HASH_SECRET:?Set IP_HASH_SECRET in .env (see .env.docker.example)}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      ALLOW_LOCALHOST_CORS: ${ALLOW_LOCALHOST_CORS:-true}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      VENTWALL_SEED_DB: ${VENTWALL_SEED_DB:-true}
    ports:
      - "${VENTWALL_API_PORT:-4000}:4000"
    volumes:
      - ventwall_media:/app/server/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${VENTWALL_WEB_PORT:-3000}:80"

volumes:
  ventwall_pgdata:
  ventwall_media: