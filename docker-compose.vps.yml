# Explicit VPS overlay (merge on top of docker-compose.yml — not a standalone file).
#
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml config
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml build --parallel 1
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Same with: podman compose -f docker-compose.yml -f docker-compose.vps.yml …

# Note: do not use Compose-only tags like !reset here — they break older
# docker-compose, podman-compose, and standard YAML tools.
# Postgres is bound to 127.0.0.1 in docker-compose.yml (not the public NIC).

services:
  api:
    environment:
      # Prefer production defaults when these keys are unset in .env.
      # If .env already sets them, those values win — set explicitly on VPS:
      #   CLIENT_ORIGIN=https://your-domain
      #   ALLOW_LOCALHOST_CORS=false
      #   VENTWALL_SEED_DB=false
      ALLOW_LOCALHOST_CORS: ${ALLOW_LOCALHOST_CORS:-false}
      VENTWALL_SEED_DB: ${VENTWALL_SEED_DB:-false}

  web:
    build:
      args:
        VITE_API_URL: /api
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-512}
